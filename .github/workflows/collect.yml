name: RSS収集

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: ライブラリインストール
        run: pip install -r requirements.txt
      - name: RSS収集実行
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: dev-secret
        run: python collector.py