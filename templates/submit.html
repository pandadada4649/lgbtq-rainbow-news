<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>情報を投稿 — Rainbow News</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--white:#fff;--bg:#f8f7fc;--border:#eeebf8;--text:#1a1535;--text2:#6b6485;--text3:#b0abca;--accent:#7c5cbf;--pink:#f06292;--shadow:0 2px 16px rgba(124,92,191,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
.rainbow-bar{height:4px;background:linear-gradient(90deg,#ff9aa2,#ffb347,#ffd700,#a8e6cf,#87ceeb,#c9b8ff,#ffb3d1)}
header{background:var(--white);border-bottom:1px solid var(--border);height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.04);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#f8bbd0,#e1bee7,#bbdefb);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.logo-name{font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:700;background:linear-gradient(90deg,#7c5cbf,#f06292);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back{font-size:.8rem;color:var(--text2);padding:6px 14px;border:1px solid var(--border);border-radius:16px;transition:.15s}
.back:hover{border-color:#c9b8ff;color:var(--accent)}
main{max-width:580px;margin:36px auto;padding:0 20px 40px}
.page-title{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.page-sub{font-size:.82rem;color:var(--text2);margin-bottom:24px;line-height:1.6}
.error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:10px 14px;border-radius:10px;font-size:.82rem;margin-bottom:16px}
.card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{font-size:.8rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.75rem;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:12px;background:var(--white);color:var(--text);font-size:.88rem;outline:none;transition:.15s;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#c9b8ff}
.field input::placeholder,.field textarea::placeholder{color:var(--text3)}
.field textarea{resize:vertical;min-height:90px;line-height:1.6}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}
/* 画像アップロード */
.img-upload{
  border:2px dashed var(--border);border-radius:12px;
  padding:24px;text-align:center;cursor:pointer;transition:.15s;
  background:var(--bg)
}
.img-upload:hover{border-color:#c9b8ff;background:#f9f6ff}
.img-upload input{display:none}
.img-upload .icon{font-size:2rem;margin-bottom:8px}
.img-upload p{font-size:.8rem;color:var(--text2)}
.img-upload span{font-size:.72rem;color:var(--text3)}
.img-preview{display:none;width:100%;height:160px;object-fit:cover;border-radius:10px;margin-top:10px}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7c5cbf,#f06292);color:#fff;border:none;border-radius:14px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(124,92,191,.3)}
.note{text-align:center;font-size:.75rem;color:var(--text3);margin-top:10px;line-height:1.6}
@media(max-width:560px){.field-row{flex-direction:column;gap:0}}
</style>
</head>
<body>
<div class="rainbow-bar"></div>
<header>
  <a href="/" class="logo">
    <div class="logo-icon">🌈</div>
    <span class="logo-name">Rainbow News</span>
  </a>
  <a href="/" class="back">← ホームへ</a>
</header>
<main>
  <h1 class="page-title">情報を投稿する</h1>
  <p class="page-sub">イベント・ニュース・お知らせなどをコミュニティにシェアしましょう🌈</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="POST" action="{{ url_for('submit') }}" enctype="multipart/form-data">

    <div class="card">
      <h2>📝 基本情報</h2>
      <div class="field">
        <label>タイトル *</label>
        <input type="text" name="title" required placeholder="例: 大阪レインボーフェスタ2025開催！">
      </div>
      <div class="field">
        <label>URL（元のページ）</label>
        <input type="url" name="url" placeholder="https://...">
      </div>
      <div class="field">
        <label>概要・説明</label>
        <textarea name="summary" placeholder="イベントの詳細、ニュースの要約など..."></textarea>
      </div>
    </div>

    <div class="card">
      <h2>🖼️ 画像</h2>
      <div class="img-upload" onclick="document.getElementById('imgInput').click()">
        <div class="icon">📸</div>
        <p>クリックして画像をアップロード</p>
        <span>PNG, JPG, GIF, WebP / 最大5MB</span>
        <input type="file" id="imgInput" name="image" accept="image/*" onchange="previewImg(this)">
        <img class="img-preview" id="imgPreview" alt="プレビュー">
      </div>
    </div>

    <div class="card">
      <h2>🏷️ 分類</h2>
      <div class="field-row">
        <div class="field">
          <label>カテゴリ</label>
          <select name="category">
            {% for c in categories %}
              {% if c.id != 'all' %}
                <option value="{{ c.id }}">{{ c.emoji }} {{ c.label }}</option>
              {% endif %}
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>エリア</label>
          <select name="area">
            {% for a in areas %}
              <option value="{{ a }}">{{ a }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="field">
        <label>投稿者名 / 団体名</label>
        <input type="text" name="source_name" placeholder="例: 大阪LGBTQ実行委員会">
      </div>
    </div>

    <button class="submit-btn" type="submit">🌈 投稿する</button>
    <p class="note">投稿した情報はサイトに表示されます。<br>不適切な情報は削除される場合があります。</p>
  </form>
</main>

<script>
function previewImg(input) {
  const preview = document.getElementById('imgPreview');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
</body>
</html>
