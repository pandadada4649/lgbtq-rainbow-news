<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>情報を投稿 — Rainbow News</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;--text:#e8e8f0;--text2:#888899;--accent:#c084fc;--accent2:#f472b6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
.rainbow-bar{height:3px;background:linear-gradient(90deg,#f87171,#fb923c,#fbbf24,#4ade80,#60a5fa,#a78bfa,#f472b6)}
header{background:rgba(10,10,15,.9);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo-name{font-size:1rem;font-weight:900}
.back-btn{font-size:.82rem;color:var(--text2);padding:6px 14px;border:1px solid var(--border);border-radius:20px;transition:.2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
main{max-width:560px;margin:40px auto;padding:0 20px}
h1{font-size:1.4rem;font-weight:900;margin-bottom:6px}
.sub{color:var(--text2);font-size:.85rem;margin-bottom:32px}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.8rem;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{
  width:100%;padding:11px 16px;border:1px solid var(--border);border-radius:12px;
  background:var(--surface2);color:var(--text);font-size:.9rem;outline:none;transition:.2s;
  font-family:inherit
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field input::placeholder,.field textarea::placeholder{color:var(--text2)}
.field textarea{resize:vertical;min-height:100px}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
.error{background:#2d1b1b;border:1px solid #f87171;color:#fca5a5;padding:12px 16px;border-radius:12px;font-size:.85rem;margin-bottom:16px}
.submit-btn{
  width:100%;padding:14px;background:var(--accent);color:#fff;border:none;
  border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;
  font-family:inherit;letter-spacing:.02em
}
.submit-btn:hover{background:#b06de0;transform:translateY(-1px)}
.note{font-size:.75rem;color:var(--text2);margin-top:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="rainbow-bar"></div>
<header>
  <a href="/" class="logo-name">🌈 Rainbow News</a>
  <a href="/" class="back-btn">← 戻る</a>
</header>
<main>
  <h1>情報を投稿する</h1>
  <p class="sub">イベント・ニュース・お知らせなどをシェアしましょう</p>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <div class="form-card">
    <form method="POST" action="{{ url_for('submit') }}">
      <div class="field">
        <label>タイトル *</label>
        <input type="text" name="title" required placeholder="例: 大阪レインボーフェスタ2025開催決定">
      </div>
      <div class="field">
        <label>URL（元のページ）</label>
        <input type="url" name="url" placeholder="https://...">
      </div>
      <div class="field">
        <label>概要・説明</label>
        <textarea name="summary" placeholder="イベントの詳細、ニュースの要約など..."></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>カテゴリ</label>
          <select name="category">
            {% for c in categories %}
              <option value="{{ c.id }}" {% if c.id == 'general' %}selected{% endif %}>{{ c.emoji }} {{ c.label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>エリア</label>
          <select name="area">
            {% for a in areas %}
              <option value="{{ a }}">{{ a }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="field">
        <label>投稿者名 / サイト名</label>
        <input type="text" name="source_name" placeholder="例: 大阪LGBTQ実行委員会">
      </div>
      <button class="submit-btn" type="submit">🌈 投稿する</button>
      <p class="note">投稿した情報はサイトに表示されます。不適切な情報は削除される場合があります。</p>
    </form>
  </div>
</main>
</body>
</html>
